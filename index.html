<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self';">
<title>飯店房間預約系統</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#0b3d91; color:white; padding:15px; text-align:center; }
.container { padding:20px; }

.card { background:white; padding:15px; margin:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.grid { display:flex; flex-wrap:wrap; }
.card { width:300px; cursor:pointer; }

button { background:#0b3d91; color:white; padding:10px; border:none; margin-top:10px; }
</style>
</head>

<body>

<header>
<h1>飯店房間預約系統</h1>
</header>

<div class="container">

<h3>查詢條件</h3>
<input type="number" id="guests" placeholder="入住人數" />

<div class="grid" id="roomList"></div>

<div id="formSection" style="display:none;">
<h3>預約表單</h3>
<input id="name" placeholder="姓名"><br>
<input id="email" placeholder="Email"><br>
<input id="date" type="date"><br>
<input id="checkout" type="date"><br>
<input id="people" type="number" placeholder="人數"><br>
<input id="purpose" placeholder="目的"><br>
<textarea id="note" placeholder="備註"></textarea><br>

<button onclick="submitBooking()">送出</button>
</div>

</div>

<script>
const rooms = [
 {name:"豪華雙人房", capacity:2},
 {name:"家庭房", capacity:4},
 {name:"單人房", capacity:1},
 {name:"商務套房", capacity:2},
 {name:"經濟雙床房", capacity:2}
];

let selectedRoom = "";

// 顯示房間
document.getElementById("guests").addEventListener("input", e=>{
 const g = e.target.value;

 const html = rooms
  .filter(r => r.capacity >= g)
  .map(r => `
   <div class="card" onclick="selectRoom('${r.name}')">
    <h3>${r.name}</h3>
    <p>容量: ${r.capacity}</p>
   </div>
  `).join("");

 document.getElementById("roomList").innerHTML = html;
});

// 選房
function selectRoom(room){
 selectedRoom = room;
 document.getElementById("formSection").style.display="block";
}

// 儲存（含7天過期）
function submitBooking(){
 const data = {
  id: Date.now(),
  name: name.value,
  email: email.value,
  room: selectedRoom,
  date: date.value,
  checkout: checkout.value,
  people: people.value,
  purpose: purpose.value,
  note: note.value,
  status:"待確認",
  time: new Date().toLocaleString()
 };

 let bookings = JSON.parse(localStorage.getItem("bookings")||"[]");
 bookings.push(data);

 localStorage.setItem("bookings", JSON.stringify(bookings));
 localStorage.setItem("expire", Date.now() + 7*24*60*60*1000);

 alert("預約已送出，請等待飯店確認");
}
</script>

</body>
</html>
